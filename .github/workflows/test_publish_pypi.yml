name: test_publish_pypi

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  publish-testpypi:
    name: Build & Upload to TestPyPI
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show repo layout (diagnostic)
        working-directory: ${{ github.workspace }}
        run: |
          echo "pwd: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          ls -la
          echo "Show pyproject.toml head (if present):"
          sed -n '1,120p' pyproject.toml || true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Ensure packaging toolchain is up-to-date
        working-directory: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine

      - name: Clean previous builds
        working-directory: ${{ github.workspace }}
        run: |
          rm -rf dist build *.egg-info || true

      - name: Build package
        working-directory: ${{ github.workspace }}
        run: |
          python -m build

      - name: Inspect built wheel METADATA
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -n1)
          echo "Wheel: $WHEEL"
          echo "---- METADATA ----"
          unzip -p "$WHEEL" "$(basename "$WHEEL" .whl).dist-info/METADATA" || unzip -p "$WHEEL" */*.dist-info/METADATA || true
          echo "---- END METADATA ----"
          ls -la dist

      - name: Verify package metadata with twine
        working-directory: ${{ github.workspace }}
        run: |
          python -m twine check dist/*

      - name: Publish to TestPyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist