jobs:
  publish-testpypi:
    name: Build & Upload to TestPyPI
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show repo layout (debug)
        run: |
          echo "PWD: $(pwd)"
          ls -la
          echo "Show pyproject.toml head:"
          sed -n '1,120p' pyproject.toml || true

      - name: Ensure packaging toolchain is up-to-date
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine

      - name: Clean previous builds
        run: |
          rm -rf dist build *.egg-info || true

      - name: Build package
        run: |
          python -m build

      - name: Inspect built wheel METADATA (debug)
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -n1)
          echo "Wheel: $WHEEL"
          echo "---- METADATA ----"
          unzip -p "$WHEEL" "$(basename "$WHEEL" .whl).dist-info/METADATA" || \
            unzip -p "$WHEEL" */*.dist-info/METADATA || true
          echo "---- END METADATA ----"
          echo "List dist:"
          ls -la dist

      - name: Verify package metadata with twine
        run: |
          python -m twine check dist/*

      - name: Publish to TestPyPI via OIDC
        if: github.event_name == 'push'
        uses: pypa/gh-action-pypi-publish@v1.8.11
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
