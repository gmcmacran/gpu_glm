name: test_publish_pypi

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  publish-testpypi:
    name: Build & Upload to TestPyPI
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo layout (diagnostic)
        run: |
          echo "PWD: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          ls -la
          echo "Show pyproject.toml head (if present):"
          sed -n '1,120p' pyproject.toml || true
        working-directory: ${{ github.workspace }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure packaging toolchain is up-to-date
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine
        working-directory: ${{ github.workspace }}

      - name: Clean previous builds
        run: |
          rm -rf dist build *.egg-info || true
        working-directory: ${{ github.workspace }}

      - name: Build package
        run: |
          python -m build
        working-directory: ${{ github.workspace }}

      - name: Inspect built wheel METADATA
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -n1)
          echo "Wheel: $WHEEL"
          echo "---- METADATA ----"
          unzip -p "$WHEEL" "$(basename "$WHEEL" .whl).dist-info/METADATA" || unzip -p "$WHEEL" */*.dist-info/METADATA || true
          echo "---- END METADATA ----"
          ls -la dist
        working-directory: ${{ github.workspace }}

      - name: Verify package metadata with twine
        run: |
          python -m twine check dist/*
        working-directory: ${{ github.workspace }}

      - name: Publish to TestPyPI via OIDC
        if: github.event_name == 'push'
        uses: pypa/gh-action-pypi-publish@v1.8.11
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
